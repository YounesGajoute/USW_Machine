# Stock lightdm.service has Conflicts=plymouth-quit.service so the DM and that unit
# cannot be scheduled together — our delayed quit lived in plymouth-quit.service and
# never ran. We mask plymouth-quit and use us-machine-plymouth-boot-wait.service instead.
[Unit]
After=us-machine-headless-web.service us-machine-plymouth-boot-wait.service
Requires=us-machine-plymouth-boot-wait.service
Wants=us-machine-headless-web.service
