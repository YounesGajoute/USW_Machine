# Getty on tty1 must not start until Plymouth has quit. Stock ordering only waits for
# plymouth-quit-wait (ends almost immediately). Our real wait lives in
# us-machine-plymouth-boot-wait.service (masked plymouth-quit); without this, tty1
# agetty draws over the TECHMAC splash for the whole boot wait.
[Unit]
After=us-machine-plymouth-boot-wait.service
Requires=us-machine-plymouth-boot-wait.service
